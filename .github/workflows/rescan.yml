# .github/workflows/Scanning.yml
name: rescan data

on: [push]
#  schedule:
    # Runs "At 18:00 on every day-of-week from Monday through Friday." (see https://crontab.guru)
#    - cron: '0 01 * * 1-5'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [ '18' ]
    steps:
      - uses: actions/checkout@v3
      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
      - name: Jalankan Skrip
        env:
          SUPER_SECRET: ${{ secrets.SUPER_SECRET }}
        run: |
          #echo "$SUPER_SECRET" | base64 --decode > this.zip
          #unzip this.zip > /dev/null 2>&1
          #rm -rf data/
          #sh start.sh > /dev/null 2>&1
          ls data/avg/ > 1.txt
          cat 1.txt | sed "s/^/cat data\/avg\//; s/$/\/*.json | jq -c .[] | jq -cs 'flatten' > data\/avg\//" > 2.txt
          paste -d "" 2.txt 1.txt | sed 's/$/\/resume.json/' | sh
          rm *.txt
      - name: Commit
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "[AUTO:BUILD] `date`"
      - name: GitHub Push
        uses: ad-m/github-push-action@master
        with:
          force: true
          directory: "."
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
